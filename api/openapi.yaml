openapi: 3.0.3
info:
  title: podman-api
  version: 1.0.0
  description: |
    REST wrapper around Podman's libpod API. Manages parameterised pod
    instances across a fleet of remote Podman hosts via SSH-tunneled
    sockets. See README.md for the deployment story.

servers:
  - url: http://127.0.0.1:8080
    description: local loopback (default)

tags:
  - name: process
  - name: hosts
  - name: templates
  - name: secrets
  - name: instances
  - name: lifecycle
  - name: bulk
  - name: logs
  - name: volumes
  - name: jobs
  - name: migrate
  - name: backups

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Argon2id-hashed bearer tokens defined in `auth/keys.yaml`. The
        token's `scopes` must include the scope listed on each operation.

  parameters:
    HostID:
      name: host
      in: path
      required: true
      schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
    TemplateID:
      name: template
      in: path
      required: true
      schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
    Slug:
      name: slug
      in: path
      required: true
      schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
    SecretName:
      name: name
      in: path
      required: true
      schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
    VolumeName:
      name: name
      in: path
      required: true
      schema: {type: string}
    TemplateOptional:
      name: template
      in: query
      required: false
      description: optional template filter; omit to list across all templates
      schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
    SkipPull:
      name: skip_pull
      in: query
      required: false
      description: skip the pre-pull step (CI / local image refs)
      schema: {type: boolean, default: false}

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [
            invalid_body, invalid_query, invalid_parameters, invalid_action,
            missing_token, invalid_token, missing_scope,
            unknown_host, unknown_template, instance_not_found,
            instance_already_exists, host_secret_missing, host_draining,
            template_already_exists, template_in_use, invalid_template,
            upstream_error, too_many_ops, internal,
            invalid_request, port_conflict, not_found, not_implemented,
          ]
        message: {type: string}
        details:
          type: object
          additionalProperties: true

    Host:
      type: object
      required: [id, addr, status]
      properties:
        id: {type: string}
        addr: {type: string, description: '"unix" or "user@host"'}
        labels:
          type: object
          additionalProperties: {type: string}
        status:
          type: string
          enum: [ok, unreachable, unknown]
        podman_version:
          type: string
          description: present when status=ok
        draining:
          type: boolean
          description: when true, create-shaped Apply returns 423
        instance_count:
          type: integer
          description: managed pods on the host (present when reachable)
        container_count:
          type: integer
          description: total containers across managed pods on the host (present when reachable)
        load:
          type: object
          description: Point-in-time host resource snapshot. Present only when the host is reachable.
          properties:
            cpus: {type: integer}
            mem_total: {type: integer, format: int64, description: bytes}
            mem_free: {type: integer, format: int64, description: bytes}
            mem_used_pct: {type: number}
            cpu_pct: { type: number, description: "average CPU utilization since boot (user+system %); cumulative, not instantaneous — use loadavg for current load. Omitted when unavailable" }
            loadavg:
              type: array
              items: {type: number}
              minItems: 3
              maxItems: 3
              description: "1/5/15-minute load average; omitted when unavailable"
            disk:
              type: object
              properties:
                total: {type: integer, format: int64}
                used: {type: integer, format: int64}
                free: {type: integer, format: int64}
                reclaimable: {type: integer, format: int64}

    Template:
      type: object
      required: [id]
      properties:
        id: {type: string}
        display:
          type: object
          description: human-readable presentation metadata for catalog UIs
          properties:
            name: {type: string}
            description: {type: string}
            category: {type: string}
            icon: {type: string}
        parameters:
          type: array
          items: {$ref: '#/components/schemas/ParamDef'}
        secrets:
          type: object
          properties:
            per_instance:
              type: array
              items: {type: string}
            per_host_referenced:
              type: array
              items: {type: string}
        volumes:
          type: array
          items:
            type: object
            properties:
              name: {type: string}
              backup: {type: string}
        ingress:
          type: object
          nullable: true
          description: which container+port serves HTTP; null on non-web templates
          properties:
            container: {type: string}
            port: {type: integer}
        body:
          type: string
          description: the renderable template body (Go text/template over YAML)
        origin:
          type: string
          description: provenance of the stored template (e.g. "seed" or "api")
        created: {type: string, format: date-time}
        updated: {type: string, format: date-time}

    ParamDef:
      type: object
      required: [name, type]
      properties:
        name: {type: string}
        type:
          type: string
          enum: [string, int, bool, select]
        required: {type: boolean}
        label: {type: string}
        description: {type: string}
        default:
          description: value used when the parameter is omitted on deploy
        placeholder: {type: string}
        options:
          type: array
          description: allowed values when type is "select"
          items: {type: string}
        secret:
          type: boolean
          description: true when this parameter carries a secret value

    TemplateInput:
      type: object
      description: >-
        Request body for create/update. On create, id names the new template; on
        update the path id wins and any id in the body is ignored.
      required: [body]
      properties:
        id: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        body:
          type: string
          description: the renderable template body (Go text/template over YAML)
        display:
          type: object
          properties:
            name: {type: string}
            description: {type: string}
            category: {type: string}
            icon: {type: string}
        parameters:
          type: array
          items: {$ref: '#/components/schemas/ParamDef'}
        secrets:
          type: object
          properties:
            per_instance:
              type: array
              items: {type: string}
            per_host_referenced:
              type: array
              items: {type: string}
        volumes:
          type: array
          items:
            type: object
            properties:
              name: {type: string}
              backup: {type: string}
        ingress:
          type: object
          nullable: true
          properties:
            container: {type: string}
            port: {type: integer}

    Container:
      type: object
      required: [name, image, status]
      properties:
        name: {type: string}
        image:
          type: string
          description: resolved digest, e.g. "docker.io/library/postgres@sha256:..."
        image_tag: {type: string}
        status: {type: string}
        started_at: {type: string, format: date-time}
        ports:
          type: array
          items: {$ref: '#/components/schemas/PortMapping'}

    PortMapping:
      type: object
      required: [host_port, container_port, protocol]
      properties:
        host_ip: {type: string}
        host_port: {type: integer}
        container_port: {type: integer}
        protocol: {type: string, enum: [tcp, udp]}
        pod: {type: string}
        container: {type: string}

    Volume:
      type: object
      required: [name, size_bytes]
      properties:
        name: {type: string}
        size_bytes: {type: integer, format: int64}

    Observed:
      type: object
      required: [template, slug, pod, containers]
      properties:
        template: {type: string}
        slug: {type: string}
        pod:
          type: object
          properties:
            id: {type: string}
            status: {type: string}
            created: {type: string, format: date-time}
        containers:
          type: array
          items: {$ref: '#/components/schemas/Container'}
        volumes:
          type: array
          items: {$ref: '#/components/schemas/Volume'}
        env_summary:
          type: object
          additionalProperties: {type: string}
          description: env vars excluding any sourced from secretKeyRef

    ApplyRequest:
      type: object
      required: [template, slug, parameters]
      properties:
        template: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        slug: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        parameters:
          type: object
          additionalProperties: true
          description: all template-required params, plus any optional ones
        secrets:
          type: object
          additionalProperties: {type: string}
          description: per-instance secret values (zeroed after use)

    UpgradeRequest:
      type: object
      required: [image]
      properties:
        image: {type: string}
        parameters:
          type: object
          additionalProperties: true
        secrets:
          type: object
          additionalProperties: {type: string}

    UpgradeImageRequest:
      type: object
      required: [image]
      properties:
        image: {type: string}

    MigrateRequest:
      type: object
      required: [from_host, to_host, template, slug]
      properties:
        from_host: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        to_host: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        template: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        slug: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        parameters:
          type: object
          additionalProperties: true
          description: optional overrides; defaults to the source instance's stored params

    EvacuateRequest:
      type: object
      required: [from_host, map]
      properties:
        from_host: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        map:
          type: object
          additionalProperties: {type: string}
          description: >-
            slug -> destination host for every instance on from_host. Must cover
            exactly the instances stored on the host (strict bijection).
        concurrency:
          type: integer
          minimum: 1
          maximum: 32
          description: >-
            optional: max child migrations to run at once for this evacuate.
            Overrides the server's -evacuate-concurrency default; clamped to
            [1,32].

    EvacuationPlan:
      type: object
      description: Result of POST /evacuate/plan — the resolved moves and their preflight verdicts.
      required: [from_host, moves]
      properties:
        from_host: {type: string}
        moves:
          type: array
          items: {$ref: '#/components/schemas/PlannedMove'}

    PlannedMove:
      type: object
      required: [slug, template, to_host, ok, issues, provisions]
      properties:
        slug: {type: string}
        template: {type: string}
        to_host: {type: string}
        ok:
          type: boolean
          description: true iff issues is empty (the destination would currently accept the move).
        issues:
          type: array
          items: {$ref: '#/components/schemas/PlanIssue'}
        provisions:
          type: array
          items:
            type: string
          description: >
            Per-host secrets absent on the destination that the evacuate will
            auto-provision from the source host's persisted value. Non-blocking:
            a move with provisions and no issues is still ok.

    PlanIssue:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [destination_draining, instance_exists, host_secret_missing, port_conflict, invalid_parameters, check_error]
        message: {type: string}

    JobAccepted:
      type: object
      required: [job_id]
      properties:
        job_id: {type: string}

    BackupAccepted:
      type: object
      required: [job_id, backup_id]
      properties:
        job_id: {type: string}
        backup_id:
          type: string
          description: id of the backup row the job will populate (returned before the job runs)

    Backup:
      type: object
      description: >-
        One backup row. Per-volume name+size are exposed; the internal sha256
        manifests used to verify a restore are not.
      required: [id, host, template, slug, state, created]
      properties:
        id: {type: string}
        host: {type: string}
        template: {type: string}
        slug: {type: string}
        state:
          type: string
          enum: [creating, complete, failed]
        image:
          type: string
          description: image ref at backup time; informational hint only
        volumes:
          type: array
          items: {$ref: '#/components/schemas/BackupVolume'}
        created: {type: string, format: date-time}
        finished:
          type: string
          format: date-time
          description: omitted until the backup reaches a terminal (complete/failed) state

    BackupVolume:
      type: object
      required: [name, size_bytes]
      properties:
        name: {type: string, description: full volume name (<template>-<slug>-<vol>)}
        size_bytes: {type: integer, format: int64, description: exported tar size in bytes}

    SecretValue:
      type: object
      required: [value]
      properties:
        value: {type: string}
        persist:
          type: boolean
          default: true
          description: >
            When the state store is enabled, also persist this value so a later
            migrate/evacuate can auto-provision the secret on a destination host.
            Set false to push to the host only. No effect when the store is disabled.
            Note: rotating with persist:false updates the host but not the store,
            so a later migrate/evacuate would provision the previously-stored
            (now stale) value onto a destination.

    BulkRequest:
      type: object
      required: [ops]
      properties:
        ops:
          type: array
          maxItems: 100
          items:
            type: object
            required: [action, template, slug]
            properties:
              action:
                type: string
                enum: [start, stop, restart, delete]
              template: {type: string}
              slug: {type: string}
              prune_volumes: {type: boolean}
              prune_secrets: {type: boolean}

    BulkResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [index, action, template, slug, status]
            properties:
              index: {type: integer}
              action: {type: string}
              template: {type: string}
              slug: {type: string}
              status: {type: integer, description: HTTP status for this op}
              code: {type: string}
              message: {type: string}

    Job:
      type: object
      properties:
        id: {type: string}
        kind: {type: string}
        state:
          type: string
          enum: [queued, running, reconciling, succeeded, failed, canceled]
          description: >
            Job lifecycle state. `reconciling` is a non-terminal state entered
            only at startup: a migrate that was in flight when the daemon
            restarted is being driven to a consistent end state (rolled forward
            if its destination is already healthy, otherwise rolled back).
            Cancelling a reconciling job records `canceled` and signals any
            in-flight reconciliation pass to stop; a pass that has already begun
            applying changes may still complete.
        args: {}
        steps:
          type: array
          items:
            type: object
            properties:
              ts: {type: string, format: date-time}
              step: {type: string}
              detail: {type: string}
        parent_id: {type: string}
        error: {type: string}
        created: {type: string, format: date-time}
        started: {type: string, format: date-time}
        finished: {type: string, format: date-time}

  responses:
    Unauthorized:
      description: missing or invalid bearer token
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Forbidden:
      description: token lacks required scope
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    BadRequest:
      description: invalid path/query/body
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    NotFound:
      description: unknown host, template, or instance
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Conflict:
      description: instance already exists
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    HostDraining:
      description: 423 when the host is draining and the request is create-shaped
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    UpstreamError:
      description: 502 when an image pull or other upstream call fails
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [process]
      summary: liveness probe (no auth)
      security: []
      responses:
        '200':
          description: OK
          content: {application/json: {schema: {type: object}}}

  /openapi.yaml:
    get:
      tags: [process]
      summary: this spec (no auth)
      security: []
      responses:
        '200':
          description: spec
          content: {text/yaml: {schema: {type: string}}}

  /hosts:
    get:
      tags: [hosts]
      summary: list configured hosts with reachability and instance count
      responses:
        '200':
          description: list
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/Host'}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
      x-required-scope: hosts:read

  /hosts/{host}:
    get:
      tags: [hosts]
      summary: one host's reachability and instance count
      parameters: [{$ref: '#/components/parameters/HostID'}]
      responses:
        '200':
          description: host
          content: {application/json: {schema: {$ref: '#/components/schemas/Host'}}}
        '404': {$ref: '#/components/responses/NotFound'}
      x-required-scope: hosts:read

  /hosts/{host}/healthz:
    get:
      tags: [hosts]
      summary: probe a single host's podman socket
      parameters: [{$ref: '#/components/parameters/HostID'}]
      responses:
        '200': {description: ok}
        '404': {$ref: '#/components/responses/NotFound'}
      x-required-scope: hosts:read

  /hosts/{host}/ports-in-use:
    get:
      tags: [hosts]
      summary: every host port currently bound by a managed pod
      parameters: [{$ref: '#/components/parameters/HostID'}]
      responses:
        '200':
          description: ports
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/PortMapping'}
      x-required-scope: hosts:read

  /templates:
    get:
      tags: [templates]
      summary: list templates from the store
      responses:
        '200':
          description: list
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/Template'}}
      x-required-scope: templates:read
    post:
      tags: [templates]
      summary: create a new template in the store
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TemplateInput'}}}
      responses:
        '201':
          description: created
          content: {application/json: {schema: {$ref: '#/components/schemas/Template'}}}
        '400':
          description: invalid body or invalid template (bad id, meta, or render)
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
        '409':
          description: a template with this id already exists (template_already_exists)
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
      x-required-scope: templates:write

  /templates/{id}:
    get:
      tags: [templates]
      summary: one template's metadata
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
      responses:
        '200':
          description: template
          content: {application/json: {schema: {$ref: '#/components/schemas/Template'}}}
        '404': {$ref: '#/components/responses/NotFound'}
      x-required-scope: templates:read
    put:
      tags: [templates]
      summary: update an existing template (id is taken from the path)
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TemplateInput'}}}
      responses:
        '200':
          description: updated
          content: {application/json: {schema: {$ref: '#/components/schemas/Template'}}}
        '400':
          description: invalid body or invalid template (bad meta or render)
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
        '404': {$ref: '#/components/responses/NotFound'}
      x-required-scope: templates:write
    delete:
      tags: [templates]
      summary: delete a template
      description: >-
        Fails with 409 (template_in_use) when instances are still deployed from
        this template, unless force=true is passed.
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
        - name: force
          in: query
          required: false
          description: delete even when instances are still deployed from this template
          schema: {type: boolean, default: false}
      responses:
        '204': {description: removed}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: instances are still deployed from this template (template_in_use)
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
      x-required-scope: templates:write

  /templates/{id}/clone:
    post:
      tags: [templates]
      summary: clone an existing template under a new id
      parameters:
        - name: id
          in: path
          required: true
          description: id of the source template to clone
          schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_id]
              properties:
                new_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
      responses:
        '201':
          description: created
          content: {application/json: {schema: {$ref: '#/components/schemas/Template'}}}
        '400':
          description: invalid body or invalid new_id
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: a template with new_id already exists (template_already_exists)
          content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}
      x-required-scope: templates:write

  /templates/{id}/render:
    get:
      tags: [templates]
      summary: render a template with query-string parameters (preview only)
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-z0-9][a-z0-9-]{0,38}[a-z0-9]$'}
      responses:
        '200':
          description: rendered YAML
          content: {text/yaml: {schema: {type: string}}}
      x-required-scope: templates:read

  /hosts/{host}/secrets:
    get:
      tags: [secrets]
      summary: list per-host secrets known to podman
      parameters: [{$ref: '#/components/parameters/HostID'}]
      responses:
        '200':
          description: list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: {type: string}
                    created_at: {type: string, format: date-time}
      x-required-scope: secrets:read

  /hosts/{host}/secrets/{name}:
    put:
      tags: [secrets]
      summary: create or rotate a per-host secret
      parameters:
        - {$ref: '#/components/parameters/HostID'}
        - {$ref: '#/components/parameters/SecretName'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/SecretValue'}}}
      responses:
        '204': {description: stored}
        '400': {$ref: '#/components/responses/BadRequest'}
      x-required-scope: secrets:write
    delete:
      tags: [secrets]
      summary: remove a per-host secret (idempotent)
      parameters:
        - {$ref: '#/components/parameters/HostID'}
