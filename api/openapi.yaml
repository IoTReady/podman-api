  /evacuate:
    post:
      tags: [migrate]
      summary: enqueue a job to evacuate every instance off a host (requires -state-db)
      description: >-
        Validates the request synchronously against the stored specs on
        from_host: every instance on the host must have a destination in map and
        every map key must name an instance on the host (strict bijection). Any
        bad map content — an unmapped/extra/ambiguous slug, a same-host
        destination, or an unknown destination host — returns 400. An unknown
        from_host returns 404. On success enqueues one parent evacuate job that
        fans out a child migrate job per instance with bounded concurrency
        (see the concurrency field / -evacuate-concurrency). The parent succeeds
        only if every child migration succeeds; per-child failures surface via
        GET /jobs?parent_id={id}. Per-instance destination-side checks run inside
        each child migrate job, not as the POST status.
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/EvacuateRequest'}}}
      responses:
        '202':
          description: evacuate job accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobAccepted'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /evacuate/plan:
    post:
      tags: [migrate]
      summary: preview an evacuation without running it (requires -state-db)
      description: >-
        Read-only dry-run of POST /evacuate. Resolves the map against the stored
        specs on from_host (identical static validation, so a request that would
        4xx on /evacuate 4xxes here identically), then runs the live destination
        preflight checks for every instance and returns a per-move report. No job
        is enqueued and nothing is mutated. Each move is ok=true only when its
        issues list is empty; a non-empty list names the blocking conditions
        (destination_draining, instance_exists, host_secret_missing,
        port_conflict, invalid_parameters) or an inconclusive check (check_error,
        e.g. the destination was unreachable). Requires only a read scope.
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/EvacuateRequest'}}}
      responses:
        '200':
          description: evacuation plan
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EvacuationPlan'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:read

  /migrate:
    post:
      tags: [migrate]
      summary: enqueue a job to migrate an instance between hosts (requires -state-db)
      description: >-
        Validates the request synchronously (known hosts/template, distinct
        source/destination, an existing stored spec) and enqueues a migrate job,
        returning its id. Destination-side checks (host-port conflicts, missing
        per-host secrets, draining destination, an instance already present) run
        inside the job and surface as job failure via GET /jobs/{id}, not as the
        POST status.
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/MigrateRequest'}}}
      responses:
        '202':
          description: migrate job accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobAccepted'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /hosts/{host}/instances/{template}/{slug}/backup:
    post:
      tags: [backups]
      summary: enqueue a backup of an instance's volumes (requires -state-db and -backup-dir)
      description: >-
        Validates synchronously (known host/template, an existing stored spec, a
        wired blob store) and enqueues a backup job, returning the job id and the
        id of the backup row it will populate. The export itself (stop, snapshot
        each volume, restart) runs inside the job; failures surface via
        GET /jobs/{id}, not as the POST status.
      parameters:
        - {name: host, in: path, required: true, schema: {type: string}}
        - {name: template, in: path, required: true, schema: {type: string}}
        - {name: slug, in: path, required: true, schema: {type: string}}
      responses:
        '202':
          description: backup job accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/BackupAccepted'}
        '404':
          description: unknown host, unknown template, or no such instance (codes unknown_host, unknown_template, instance_not_found)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '501':
          description: job runner or state store unavailable (e.g. blob store not wired in an embedded deployment); a standard deployment always has backups enabled
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /hosts/{host}/instances/{template}/{slug}/backups:
    get:
      tags: [backups]
      summary: list an instance's backups, newest first (requires -state-db)
      parameters:
        - {name: host, in: path, required: true, schema: {type: string}}
        - {name: template, in: path, required: true, schema: {type: string}}
        - {name: slug, in: path, required: true, schema: {type: string}}
        - name: limit
          in: query
          required: false
          description: max backups to return (newest first); absent or <=0 uses the default of 100, values above 1000 are clamped to 1000
          schema: {type: integer, default: 100, maximum: 1000}
      responses:
        '200':
          description: list of backups (newest first)
          content:
            application/json:
              schema:
                type: object
                required: [backups]
                properties:
                  backups:
                    type: array
                    items: {$ref: '#/components/schemas/Backup'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404':
          description: unknown host (code unknown_host)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:read

  /backups/{id}/restore:
    post:
      tags: [backups]
      summary: enqueue a restore of an instance from a backup (requires -state-db and -backup-dir)
      description: >-
        Validates synchronously (the backup exists and is complete, its host is
        known and not draining, the instance's spec still exists) and enqueues a
        restore job. The restore replaces the instance's volumes in place from
        the backup's blobs and re-applies the current spec; there is no rollback,
        so a mid-restore failure leaves the instance down with the spec preserved
        for retry. Failures surface via GET /jobs/{id}.
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        '202':
          description: restore job accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobAccepted'}
        '404':
          description: no such backup, the backup's instance no longer exists, or the backup's host is no longer configured (codes backup_not_found, instance_not_found, unknown_host)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: backup is not in a restorable state (code backup_not_restorable)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '423':
          description: the backup's host is draining (code host_draining)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '501':
          description: job runner or state store unavailable (e.g. blob store not wired in an embedded deployment); a standard deployment always has backups enabled
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /hosts/{host}/instances/{template}/{slug}/restore:
    post:
      tags: [backups]
      summary: enqueue a point-in-time restore of an instance to a chosen timestamp
      description: >-
        Enqueues a one-shot point-in-time restore that recreates the instance's
        pod with a restore intent handed to the sidecar injector (commercial
        Litestream): the injected initContainer rolls the backup-marked
        database(s) back to the requested instant. Distinct from
        /backups/{id}/restore (which restores a tarball backup of all volumes):
        this rolls a live instance back to a timestamp via the replication
        replica. The intent is one-shot and is never persisted into the stored
        spec, so a later pod restart does not replay the rollback. The timestamp
        is interpreted by the injector (Litestream uses RFC3339). Progress and
        failures (e.g. a timestamp outside the configured replica retention)
        surface via GET /jobs/{id}.
      parameters:
        - {name: host, in: path, required: true, schema: {type: string}}
        - {name: template, in: path, required: true, schema: {type: string}}
        - {name: slug, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timestamp]
              properties:
                timestamp:
                  type: string
                  description: target point in time, interpreted by the injector (Litestream uses RFC3339)
                  example: '2026-06-14T09:30:00Z'
                volumes:
                  type: array
                  items: {type: string}
                  description: optional subset of backup-marked volumes to restore; empty/omitted means all
      responses:
        '202':
          description: point-in-time restore job accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobAccepted'}
        '400':
          description: malformed body or missing timestamp (codes invalid_body, invalid_request)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: no such instance, host, or template (codes instance_not_found, unknown_host, unknown_template)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '501':
          description: job runner or state store unavailable (the job runner is required to enqueue the restore)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /backups/{id}:
    delete:
      tags: [backups]
      summary: delete a backup's blobs and metadata (requires -state-db)
      description: >-
        Synchronously removes the backup's blobs and then its row. Refused with
        409 while a backup or restore of this backup is in flight.
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        '204':
          description: backup deleted
        '404':
          description: no such backup (code backup_not_found)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: a backup or restore of this backup is in flight (code backup_busy)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write

  /jobs:
    get:
      tags: [jobs]
      summary: list async jobs (requires -state-db)
      parameters:
        - name: state
          in: query
          required: false
          description: filter by job state
          schema:
            type: string
            enum: [queued, running, reconciling, succeeded, failed, canceled]
        - name: kind
          in: query
          required: false
          description: filter by job kind
          schema: {type: string}
        - name: parent_id
          in: query
          required: false
          description: filter to children of this parent job
          schema: {type: string}
        - name: limit
          in: query
          required: false
          description: max jobs to return (newest first); defaults to 100, values above 1000 are clamped
          schema: {type: integer, default: 100, minimum: 1, maximum: 1000}
        - name: before
          in: query
          required: false
          description: cursor — return only jobs older than this job id (pass the previous page's last id); page until fewer than `limit` rows are returned
          schema: {type: string}
      responses:
        '200':
          description: list (a single page, newest first)
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/Job'}}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: jobs:read

  /jobs/{id}:
    get:
      tags: [jobs]
      summary: fetch one job by ID (requires -state-db)
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: job
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Job'}
        '404': {$ref: '#/components/responses/NotFound'}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: jobs:read

  /jobs/{id}/cancel:
    post:
      tags: [jobs]
      summary: cancel a queued, running, or reconciling job (requires -state-db)
      description: >
        Cancels a queued job immediately (it transitions to `canceled`) or
        signals a running job to stop. Cancellation of a running job is
        asynchronous — the handler unwinds (a migrate rolls back, leaving the
        source intact) and the terminal `canceled` state is recorded shortly
        after, so the 202 body may still show `running`. A parent evacuate's
        in-flight children are canceled with it — cancel the parent to stop the
        fan-out; child jobs cannot be canceled directly (a child returns 409
        while running). A reconciling job (a migrate restarted mid-flight and
        undergoing startup recovery) can be canceled as an operator escape
        hatch; the `canceled` state is recorded immediately and any in-flight
        reconciliation pass is signaled to stop (a pass already applying changes
        may still complete). A 409 with code
        `job_not_cancelable` (vs `job_terminal`) is transient — the job was
        just claimed but is not yet cancelable; retry shortly.
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '202':
          description: cancellation accepted (queued -> canceled, reconciling -> canceled, or running -> stopping)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Job'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '501':
          description: state store not enabled (-state-db not set)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
      x-required-scope: instances:write
