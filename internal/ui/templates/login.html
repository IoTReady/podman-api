{{define "login"}}
<div class="login">
  <h1>podman-api</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="post" action="/ui/login" class="pure-form pure-form-stacked">
    <label>Username <input name="username" placeholder="username" autofocus></label>
    <label>Password <input name="password" type="password" placeholder="password"></label>
    <button type="submit" class="pure-button pure-button-primary">Sign in</button>
  </form>
</div>
{{end}}
