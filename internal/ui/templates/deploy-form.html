{{define "deploy-form"}}
<h2>Deploy on {{.Host}}</h2>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<form hx-post="/ui/hosts/{{.Host}}/deploy" hx-target="#main" class="pure-form pure-form-stacked">
  <input type="hidden" name="csrf_token" value="{{.CSRF}}">
  <label>Template
    <select name="template" hx-post="/ui/hosts/{{.Host}}/deploy/form" hx-target="#main" hx-trigger="change" hx-include="closest form">
      {{range .Templates}}<option value="{{.Meta.ID}}"{{if eq .Meta.ID $.Selected}} selected{{end}}>{{.Meta.ID}}</option>{{end}}
    </select>
  </label>
  <label>Slug <input name="slug" value="{{.Slug}}" required></label>
  {{template "instance-fields" .}}
  <button type="submit" class="pure-button pure-button-primary" hx-disabled-elt="this">Deploy</button>
</form>
{{end}}
