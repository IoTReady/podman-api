{{define "upgrade-form"}}
<h2>Upgrade {{.Template}} / {{.Slug}} on {{.Host}}</h2>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<p class="subtitle">Changes the image only. Existing parameters and secrets are reused; to rotate a secret, manage it separately.</p>
<form hx-post="/ui/hosts/{{.Host}}/instances/{{.Template}}/{{.Slug}}/upgrade" hx-target="#main" class="pure-form pure-form-stacked">
  <input type="hidden" name="csrf_token" value="{{.CSRF}}">
  {{if .CurrentImage}}<p class="subtitle">Current: <code>{{.CurrentImage}}</code></p>{{end}}
  <label>New image <input name="image" value="{{.CurrentImage}}" placeholder="docker.io/library/postgres:16" required></label>
  <button type="submit" class="pure-button pure-button-primary" hx-disable>Upgrade</button>
</form>
{{end}}
