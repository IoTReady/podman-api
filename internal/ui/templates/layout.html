{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>podman-api</title>
  <link rel="stylesheet" href="/ui/static/pure-min.css">
  <link rel="stylesheet" href="/ui/static/app.css">
  <script src="/ui/static/htmx.min.js" defer></script>
</head>
<!-- The header name is the well-known csrfHeader constant (internal/ui/session.go); hardcoded here so a missing data field can't silently produce an empty header and break every htmx mutation. -->
<body hx-headers='{"X-CSRF-Token": "{{.CSRF}}"}'>
  {{template "body" .}}
</body>
</html>{{end}}
