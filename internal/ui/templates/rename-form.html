{{define "rename-form"}}
<h2>Rename {{.Template}} / {{.Slug}} on {{.Host}}</h2>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<p class="subtitle">Changes the slug, migrating all data and secrets to the new name. The instance is stopped during migration.</p>
<form hx-post="/ui/hosts/{{.Host}}/instances/{{.Template}}/{{.Slug}}/rename" hx-target="#main" class="pure-form pure-form-stacked">
  <input type="hidden" name="csrf_token" value="{{.CSRF}}">
  <label>New slug <input name="new_slug" value="" placeholder="e.g. myapp-v2" required pattern="[a-z0-9]([a-z0-9-]*[a-z0-9])?" title="Lowercase letters, digits, hyphens (no leading/trailing hyphen)"></label>
  <label>Domains (comma-separated, optional) <input name="domains" value="{{.Domains}}" placeholder="app.example.com"></label>
  <label><input type="checkbox" name="keep_old_standby" value="true"> Keep old instance as standby (stopped, with volumes intact)</label>
  <button type="submit" class="pure-button pure-button-primary" hx-disabled-elt="this">Rename</button>
</form>
{{end}}
