name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

env:
  # The podman v5 bindings transitively pull in the storage graph drivers
  # (btrfs, devicemapper) and gpgme, which need CGO + system -dev headers.
  # We use only the remote libpod client, so we exclude those drivers and
  # swap gpgme for pure-Go OpenPGP. Keep in sync with the Makefile's TAGS.
  GO_TAGS: "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper"

jobs:
  lint-test-build:
    name: lint, test, build
    runs-on: self-hosted
    container:
      # Pin a recent Go. The GO_TAGS above exclude the CGO graph drivers so no
      # libbtrfs/libgpgme/libdevmapper headers are required; nodejs and the C
      # toolchain are installed in the first step below.
      image: docker.io/library/golang:1.26-bookworm

    steps:
      # Must run BEFORE any `uses:` step. actions/checkout and actions/cache are
      # JavaScript actions that the runner executes with `node`, which the
      # golang image does not ship — without this the job fails with
      # "executable file `node` not found in $PATH". `run:` steps use the shell,
      # not node, so this one is safe to run first. build-essential supplies the
      # C toolchain the race detector's linker needs.
      - name: install system deps (nodejs for JS actions + C toolchain)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            nodejs git ca-certificates build-essential

      - name: checkout
        uses: actions/checkout@v4

      - name: go env
        run: |
          go version
          go env GOMODCACHE GOCACHE

      - name: cache go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet -tags "$GO_TAGS" ./...

      - name: gofmt -l (fail on any unformatted file)
        run: |
          # Print the diff for clarity, then fail if any output is produced.
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::the following files need gofmt:"
            echo "$out"
            gofmt -d .
            exit 1
          fi

      - name: go test -race
        run: go test -tags "$GO_TAGS" -race ./...

      - name: go build
        run: go build -tags "$GO_TAGS" ./...

  integration:
    name: integration (podman-in-podman)
    runs-on: self-hosted
    container:
      # Fedora-based image that ships podman, catatonit and netavark and is
      # built to run podman nested. --privileged is required for nested podman
      # (storage + the networking that `podman play kube` hostPort bindings
      # need). If the runner forbids privileged jobs this step fails fast and
      # the runner config needs to allow it.
      image: quay.io/podman/stable
      options: --privileged
    env:
      # Rootful podman serves its API socket under $XDG_RUNTIME_DIR/podman; the
      # integration tests look for $XDG_RUNTIME_DIR/podman/podman.sock.
      XDG_RUNTIME_DIR: /run
      # vfs needs no /dev/fuse or overlay support, so it works regardless of how
      # the outer runner is configured. Slower than overlay but the test images
      # (alpine) are tiny.
      STORAGE_DRIVER: vfs
      # Opt into the host-wide prune scopes (image/container/build-cache). The
      # gate exists so `make test-integration` on a developer's machine never
      # reaps their state; this fixture is fresh and disposable, so it should
      # exercise every scope. See TestReal_Prune_HostWide_LocalOnly.
      PODMAN_API_ITEST_PRUNE_DESTRUCTIVE: "1"
    steps:
      # nodejs is needed by the JS-based actions/checkout; go.mod pins go 1.26
      # which Go's GOTOOLCHAIN auto-fetches on top of Fedora's older toolchain.
      - name: install go + nodejs
        run: |
          dnf -y install golang nodejs git make >/dev/null
          go version

      - name: checkout
        uses: actions/checkout@v4

      - name: cache go modules + toolchain
        uses: actions/cache@v4
        with:
          # Caching ~/go/pkg/mod also caches the Go 1.26 toolchain that
          # GOTOOLCHAIN fetches on top of Fedora's golang (it lands under
          # pkg/mod/golang.org/toolchain), so repeat runs skip both downloads.
          # Distinct key namespace from the lint-test-build job: different image
          # and build tags, so its build cache must not be shared.
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-integration-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-integration-${{ runner.os }}-

      - name: start podman services
        run: |
          # First socket (source host for evacuate tests)
          podman system service --time=0 unix:///run/podman/podman.sock &
          for i in $(seq 1 30); do
            [ -S /run/podman/podman.sock ] && break
            sleep 1
          done
          podman info >/dev/null
          podman --version

          # Second socket (destination host for evacuate tests) with separate
          # storage so the two podman instances do not share state.
          mkdir -p /tmp/podman2
          podman --root /tmp/podman2/root --runroot /tmp/podman2/run \
            system service --time=0 unix:///tmp/podman2/podman2.sock &
          for i in $(seq 1 30); do
            [ -S /tmp/podman2/podman2.sock ] && break
            sleep 1
          done
          [ -S /tmp/podman2/podman2.sock ] || { echo "podman2 socket did not appear"; exit 1; }
          podman --url unix:///tmp/podman2/podman2.sock info >/dev/null

      - name: integration tests
        # Explicit -timeout so a nested-podman hang fails clearly instead of
        # blocking on the 10m default; the two suites take ~2min each locally.
        run: go test -tags "$GO_TAGS integration" -timeout=10m ./internal/podman/... ./cmd/podman-api/...
