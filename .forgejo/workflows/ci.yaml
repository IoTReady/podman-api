name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # The podman v5 bindings transitively pull in the storage graph drivers
  # (btrfs, devicemapper) and gpgme, which need CGO + system -dev headers.
  # We use only the remote libpod client, so we exclude those drivers and
  # swap gpgme for pure-Go OpenPGP. Keep in sync with the Makefile's TAGS.
  GO_TAGS: "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper"

jobs:
  lint-test-build:
    name: lint, test, build
    runs-on: self-hosted
    container:
      # Pin a recent Go on top of a minimal image. build-essential supplies the
      # C toolchain the race detector's linker needs; the GO_TAGS above exclude
      # the CGO graph drivers so no libbtrfs/libgpgme/libdevmapper headers are
      # required.
      image: docker.io/library/golang:1.26-bookworm

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates build-essential

      - name: go env
        run: |
          go version
          go env GOMODCACHE GOCACHE

      - name: cache go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet -tags "$GO_TAGS" ./...

      - name: gofmt -l (fail on any unformatted file)
        run: |
          # Print the diff for clarity, then fail if any output is produced.
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::the following files need gofmt:"
            echo "$out"
            gofmt -d .
            exit 1
          fi

      - name: go test -race
        run: go test -tags "$GO_TAGS" -race ./...

      - name: go build
        run: go build -tags "$GO_TAGS" ./...
